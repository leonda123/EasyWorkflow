<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyWorkflow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@xyflow/react@12/dist/style.css" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fafafa;
        overflow: hidden;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d1d5db;
      }
      
      .react-flow__edge-path {
        fill: none;
      }

      @keyframes breathe {
        0%, 100% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.4); border-color: #3b82f6; }
        50% { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); border-color: #60a5fa; }
      }
      .node-running {
        animation: breathe 2s infinite ease-in-out;
        background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
      }
      
      @keyframes pulse-ring {
        0% { transform: scale(0.95); opacity: 1; }
        50% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(0.95); opacity: 1; }
      }
      .node-running-pulse {
        animation: pulse-ring 1.5s ease-in-out infinite;
      }
      
      @keyframes progress-wave {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .node-running-progress {
        background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
        background-size: 200% 100%;
        animation: progress-wave 2s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
