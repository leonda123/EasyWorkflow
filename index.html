<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyWorkflow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Import official React Flow styles to ensure correct rendering -->
    <link href="https://cdn.jsdelivr.net/npm/@xyflow/react@12/dist/style.css" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fafafa;
        overflow: hidden; /* Prevent scrolling on the main page */
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d1d5db;
      }
      
      /* Critical Fix: Ensure edge paths do not have a fill color */
      .react-flow__edge-path {
        fill: none;
      }

      /* Animation for running nodes */
      @keyframes breathe {
        0%, 100% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.4); border-color: #3b82f6; }
        50% { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); border-color: #60a5fa; }
      }
      .node-running {
        animation: breathe 2s infinite ease-in-out;
      }
    </style>

    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
